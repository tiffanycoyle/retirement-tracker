<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retirement Readiness | Marcus Cole</title>

<style>
:root {
  /* Risk Colors */
  --critical: #dc2626;
  --high: #ea580c;
  --medium: #ca8a04;
  --low: #65a30d;

  /* Surface & Text (Tailwind Stone palette) */
  --bg: #fafaf9;
  --surface: #ffffff;
  --surface-hover: #f5f5f4;
  --border: #e7e5e4;
  --border-strong: #d6d3d1;
  --text: #1c1917;
  --muted: #78716c;
  --remediation-bg: #f0fdf4;
  --focus-ring: 0 0 0 3px rgba(70, 100, 180, 0.35);

  /* Spacing */
  --space-xs: 8px;
  --space-sm: 12px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;

  /* Typography — system font stack */
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.25rem;
  --text-xl: 1.75rem;
  --text-2xl: 2rem;
  --text-3xl: clamp(2rem, 5vw, 2.75rem);

  --ease-out: cubic-bezier(0.25, 1, 0.5, 1);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font);
  font-size: var(--text-base);
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

main {
  max-width: 900px;
  margin: 0 auto;
  padding: var(--space-2xl) var(--space-lg);
}

h1, h2, h3, .font-heading {
  font-family: var(--font);
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
}

.eyebrow {
  font-size: var(--text-sm);
  font-weight: 500;
  text-transform: none;
  letter-spacing: 0.02em;
  color: var(--muted);
  margin-bottom: var(--space-md);
}

.helper-text,
.text-helper {
  font-size: var(--text-sm);
  color: var(--muted);
}

.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

/* ─── Screens ─── */
.screen {
  display: none;
  animation: fadeIn 320ms var(--ease-out);
}
.screen.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── Buttons ─── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 48px;
  padding: var(--space-sm) var(--space-xl);
  font-family: var(--font);
  font-size: var(--text-base);
  font-weight: 500;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 200ms var(--ease-out);
}
.btn:focus-visible { outline: none; box-shadow: var(--focus-ring); }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.35; pointer-events: none; }

.btn-primary { background: var(--text); color: var(--bg); }
.btn-primary:hover { background: #292524; }

.btn-secondary {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--surface); color: var(--text); }

.nav-buttons {
  margin-top: var(--space-2xl);
  display: flex;
  gap: var(--space-md);
}

.back-arrow {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 40px; height: 40px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  margin-bottom: var(--space-xl);
  font-size: 1.25rem;
  transition: all 180ms var(--ease-out);
}
.back-arrow:hover { background: var(--surface); color: var(--text); }
.back-arrow:focus-visible { outline: none; box-shadow: var(--focus-ring); }

.step-counter {
  font-size: var(--text-sm);
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--muted);
  margin-bottom: var(--space-md);
}
.current-num { color: var(--text); font-weight: 600; }

.interstitial-sub {
  margin-top: calc(var(--space-md) * -0.25);
  margin-bottom: var(--space-xl);
  max-width: 520px;
}

.section-intro {
  font-size: var(--text-sm);
  color: var(--muted);
  margin: calc(var(--space-md) * -0.5) 0 var(--space-md);
  max-width: 560px;
  line-height: 1.55;
}

/* ─── Screen 0: Opener ─── */
.opener {
  padding-top: var(--space-2xl);
}
.opener-context {
  font-family: var(--font);
  font-size: var(--text-sm);
  color: var(--muted);
  margin-bottom: var(--space-lg);
  letter-spacing: 0.01em;
}
.opener h1 {
  font-size: var(--text-3xl);
  margin-bottom: var(--space-lg);
}
.opener-body {
  font-size: var(--text-lg);
  color: var(--muted);
  line-height: 1.55;
  margin-bottom: var(--space-xl);
  max-width: 560px;
}
.meta-row {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  font-size: var(--text-sm);
  color: var(--muted);
  margin-bottom: var(--space-2xl);
}
.meta-dot {
  width: 3px; height: 3px;
  background: var(--muted);
  border-radius: 50%;
  display: inline-block;
}

/* ─── Screen 1: Gut Check ─── */
.question-label {
  font-size: var(--text-2xl);
  margin-bottom: var(--space-md);
}
.mood-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-md);
  margin: var(--space-lg) 0;
}
.mood-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-xs);
  min-height: 130px;
  padding: var(--space-md);
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: all 180ms var(--ease-out);
  font-family: var(--font);
}
.mood-card:hover { background: var(--surface-hover); border-color: var(--border-strong); }
.mood-card[aria-checked="true"] { border-color: var(--text); background: var(--bg); }
.mood-card:active { transform: scale(0.98); }
.mood-card:focus-visible { outline: none; box-shadow: var(--focus-ring); }
.mood-emoji { font-size: 2rem; line-height: 1; }
.mood-label { font-weight: 600; color: var(--text); }

@media (max-width: 480px) {
  .mood-grid { grid-template-columns: 1fr; }
}

/* ─── Screen 2: Sentence inputs ─── */
.sentence-block {
  margin: var(--space-xl) 0 var(--space-md);
  font-family: var(--font);
  font-size: var(--text-2xl);
  line-height: 1.6;
  color: var(--text);
}
.sentence-line {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 0.4em;
  margin-bottom: var(--space-md);
}
.sentence-input {
  font-family: var(--font);
  font-size: var(--text-2xl);
  font-weight: 700;
  color: var(--text);
  background: transparent;
  border: none;
  border-bottom: 2px solid var(--border-strong);
  padding: 4px 8px;
  width: 90px;
  text-align: center;
  transition: border-color 200ms var(--ease-out);
}
.sentence-input:focus {
  outline: none;
  border-bottom-color: var(--text);
}
.sentence-input::placeholder { color: var(--muted); font-weight: 400; }

.error-msg {
  color: var(--critical);
  font-size: var(--text-sm);
  min-height: 1.4em;
  margin-top: var(--space-xs);
}

/* ─── Screen 3: Interstitial ─── */
.interstitial {
  text-align: left;
  padding-top: var(--space-2xl);
}
.interstitial h2 {
  font-size: var(--text-3xl);
  margin-bottom: var(--space-md);
}
.interstitial p {
  font-size: var(--text-lg);
  color: var(--muted);
  margin-bottom: var(--space-xl);
}

/* ─── Currency input (screens 4, 5, 6) ─── */
.currency-wrap {
  position: relative;
  margin: var(--space-lg) 0 var(--space-sm);
}
.currency-prefix {
  position: absolute;
  left: var(--space-md);
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font);
  font-size: var(--text-xl);
  color: var(--muted);
  pointer-events: none;
}
.currency-input {
  width: 100%;
  font-family: var(--font);
  font-size: var(--text-xl);
  font-weight: 600;
  color: var(--text);
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: var(--space-md) var(--space-lg) var(--space-md) calc(var(--space-md) + 18px);
  min-height: 64px;
  transition: all 200ms var(--ease-out);
}
.currency-input:focus {
  outline: none;
  border-color: var(--text);
  box-shadow: var(--focus-ring);
}

/* ─── Screen 7: Loading ─── */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 50vh;
  text-align: center;
  gap: var(--space-lg);
}
.loader-dots {
  display: inline-flex;
  gap: 8px;
}
.loader-dots span {
  width: 10px; height: 10px;
  background: var(--text);
  border-radius: 50%;
  animation: dotPulse 1.2s var(--ease-out) infinite;
}
.loader-dots span:nth-child(2) { animation-delay: 0.18s; }
.loader-dots span:nth-child(3) { animation-delay: 0.36s; }
@keyframes dotPulse {
  0%, 100% { transform: translateY(0); opacity: 0.3; }
  50% { transform: translateY(-6px); opacity: 1; }
}
.loading-text {
  font-family: var(--font);
  font-size: var(--text-xl);
  color: var(--muted);
}

/* ─── Screen 8: Results dashboard ─── */
.results-header {
  text-align: center;
  margin-bottom: var(--space-xl);
}
.print-header {
  display: none;
  font-family: var(--font);
  margin-bottom: var(--space-xl);
}

.ring-wrap {
  display: flex;
  justify-content: center;
  margin: var(--space-lg) 0;
}
.progress-ring {
  width: 220px;
  height: 220px;
}
.progress-ring__track {
  fill: none;
  stroke: var(--border);
  stroke-width: 14;
}
.progress-ring__fill {
  fill: none;
  stroke: var(--text);
  stroke-width: 14;
  stroke-linecap: round;
  transform: rotate(-90deg);
  transform-origin: 50% 50%;
  transition: stroke-dashoffset 600ms var(--ease-out), stroke 300ms var(--ease-out);
}
.progress-ring__fill.tone-green { stroke: var(--low); }
.progress-ring__fill.tone-amber { stroke: var(--medium); }
.progress-ring__fill.tone-ink { stroke: var(--text); }

.ring-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.ring-pct {
  font-family: var(--font);
  font-size: 2.75rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.ring-label {
  font-size: var(--text-sm);
  color: var(--muted);
  margin-top: 4px;
}

.verdict {
  text-align: center;
  margin: var(--space-md) auto var(--space-2xl);
  max-width: 560px;
}
.verdict-headline {
  font-family: var(--font);
  font-size: var(--text-2xl);
  margin-bottom: var(--space-sm);
}
.verdict-body {
  font-size: var(--text-base);
  color: var(--muted);
  line-height: 1.6;
}

/* Math breakdown */
.section-title {
  font-family: var(--font);
  font-size: var(--text-xl);
  margin: var(--space-2xl) 0 var(--space-md);
}

.breakdown {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: var(--space-lg);
  margin-bottom: var(--space-lg);
}
.breakdown-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: var(--space-md);
  padding: var(--space-sm) 0;
  border-bottom: 1px solid var(--border);
}
.breakdown-row:last-child { border-bottom: none; }
.breakdown-label {
  font-size: var(--text-sm);
  color: var(--muted);
  flex: 1;
}
.breakdown-value {
  font-family: var(--font);
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--text);
  text-align: right;
  white-space: nowrap;
}

/* Strategy sliders */
.strategy-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: var(--space-lg);
  margin-bottom: var(--space-md);
}
.strategy-card h3 {
  font-size: var(--text-lg);
  margin-bottom: var(--space-md);
}
.slider-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: var(--space-md);
  margin-bottom: var(--space-xs);
}
.slider-label {
  font-size: var(--text-sm);
  color: var(--muted);
}
.slider-value {
  font-family: var(--font);
  font-weight: 600;
  color: var(--text);
  font-size: var(--text-base);
}
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  margin: 8px 0;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 22px; height: 22px;
  background: var(--text);
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid var(--bg);
  box-shadow: 0 0 0 1px var(--border-strong);
  transition: transform 150ms var(--ease-out);
}
input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); }
input[type="range"]::-moz-range-thumb {
  width: 22px; height: 22px;
  background: var(--text);
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid var(--bg);
  box-shadow: 0 0 0 1px var(--border-strong);
}
.slider-helper {
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: var(--space-xs);
}

/* Summary card */
.summary-card {
  background: var(--bg);
  border: 1.5px solid var(--text);
  border-radius: 12px;
  padding: var(--space-lg);
  margin: var(--space-lg) 0;
}
.summary-card h3 {
  font-size: var(--text-lg);
  margin-bottom: var(--space-md);
}
.summary-result {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-top: var(--space-md);
  border-top: 1px solid var(--border);
  margin-top: var(--space-sm);
}
.summary-result .breakdown-value {
  font-size: var(--text-xl);
}

/* Fine print toggle */
.fine-print {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: var(--space-md) var(--space-lg);
  margin: var(--space-lg) 0;
}
.fine-print summary {
  cursor: pointer;
  font-family: var(--font);
  font-weight: 600;
  font-size: var(--text-base);
  color: var(--text);
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.fine-print summary::-webkit-details-marker { display: none; }
.fine-print summary::after {
  content: "+";
  font-size: 1.4rem;
  color: var(--muted);
  transition: transform 200ms var(--ease-out);
}
.fine-print[open] summary::after { content: "−"; }
.fine-print-body {
  margin-top: var(--space-md);
  padding-top: var(--space-md);
  border-top: 1px solid var(--border);
}

/* Action cards */
.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
  margin: var(--space-md) 0 var(--space-xl);
}
.action-card {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  text-align: left;
  padding: var(--space-lg);
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 180ms var(--ease-out);
  font-family: var(--font);
  width: 100%;
}
.action-card:hover { background: var(--surface-hover); border-color: var(--border-strong); }
.action-card:focus-visible { outline: none; box-shadow: var(--focus-ring); }
.action-card h3 {
  font-size: var(--text-base);
  margin-bottom: var(--space-xs);
}
.action-card p {
  font-size: var(--text-sm);
  color: var(--muted);
}
@media (max-width: 480px) {
  .action-grid { grid-template-columns: 1fr; }
}

/* Send form */
.send-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: var(--space-lg);
  margin: var(--space-md) 0 var(--space-xl);
  display: none;
}
.send-form.active { display: block; }
.send-form h3 {
  font-size: var(--text-lg);
  margin-bottom: var(--space-xs);
}
.send-form-intro {
  font-size: var(--text-sm);
  color: var(--muted);
  margin-bottom: var(--space-lg);
}
.field {
  margin-bottom: var(--space-md);
}
.field label {
  display: block;
  font-size: var(--text-sm);
  color: var(--muted);
  margin-bottom: 6px;
}
.field input[type="text"],
.field input[type="email"],
.field textarea {
  width: 100%;
  font-family: var(--font);
  font-size: var(--text-base);
  color: var(--text);
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: var(--space-sm) var(--space-md);
  min-height: 44px;
  transition: border-color 200ms var(--ease-out);
}
.field textarea {
  min-height: 80px;
  resize: vertical;
  font-family: var(--font);
  line-height: 1.5;
}
.field input:focus,
.field textarea:focus {
  outline: none;
  border-color: var(--text);
}
.send-form-actions {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}

/* Footer cta */
.cta-footer {
  text-align: center;
  padding: var(--space-xl) 0 var(--space-md);
  border-top: 1px solid var(--border);
  margin-top: var(--space-xl);
}
.cta-footer p {
  color: var(--muted);
  font-size: var(--text-sm);
  margin-bottom: var(--space-xs);
}
.cta-ready {
  font-family: var(--font);
  font-size: var(--text-base);
  color: var(--text);
  font-weight: 600;
}

/* ─── Print ─── */
@media print {
  body { background: white; }
  main { max-width: 100%; padding: 0; }
  .screen { display: none !important; }
  .screen#screen-8 { display: block !important; }
  .strategy-card,
  .action-grid,
  .send-form,
  .cta-footer,
  .back-arrow,
  .fine-print summary::after { display: none !important; }
  .fine-print { border: none; padding: 0; }
  .fine-print[open] .fine-print-body { display: block; }
  .print-header { display: block; }
  .results-header { margin-bottom: var(--space-md); }
  .progress-ring { width: 160px; height: 160px; }
}
</style>
</head>

<body>

<main>

  <!-- ─── Screen 0: Opener ─── -->
  <section class="screen active" id="screen-0">
    <div class="opener">
      <p class="opener-context" data-content="openerContext"></p>
      <h1 data-content="openerTitle"></h1>
      <p class="opener-body" data-content="openerBody"></p>
      <div class="meta-row">
        <span data-content="metaTime"></span>
        <span class="meta-dot" aria-hidden="true"></span>
        <span data-content="metaQuestions"></span>
      </div>
      <button class="btn btn-primary" type="button" data-goto="1" data-content="btnStart"></button>
    </div>
  </section>

  <!-- ─── Screen 1: Gut Check ─── -->
  <section class="screen" id="screen-1">
    <p class="eyebrow" data-content="q1Eyebrow"></p>
    <h2 class="question-label" data-content="q1Heading"></h2>
    <div class="mood-grid" id="mood-grid-container" role="radiogroup"></div>
    <p class="helper-text" data-content="q1Helper"></p>
  </section>

  <!-- ─── Screen 2: Age sentence ─── -->
  <section class="screen" id="screen-2" aria-labelledby="q2-label">
    <button class="back-arrow" type="button" data-goto="1" aria-label="Go back">←</button>
    <div class="step-counter" aria-hidden="true" data-content="q2Progress"></div>
    <label class="sr-only" id="q2-label">Your age and target retirement age</label>
    <div class="sentence-block">
      <div class="sentence-line">
        <span data-content="q2Part1"></span>
        <input type="text" id="input-age" class="sentence-input" placeholder="42" inputmode="numeric" pattern="[0-9]*" maxlength="2" aria-label="Current age">
        <span data-content="q2Part2"></span>
      </div>
      <div class="sentence-line">
        <span data-content="q2Part3"></span>
        <input type="text" id="input-retire-age" class="sentence-input" placeholder="65" inputmode="numeric" pattern="[0-9]*" maxlength="2" aria-label="Target retirement age">
        <span data-content="q2Part4"></span>
      </div>
    </div>
    <p class="helper-text" data-content="q2Helper"></p>

// PART 2: TEMPLATE ENGINE
// ═══════════════════════════════════════════
function renderContent() {
  // Pour static text into anything with data-content
  document.querySelectorAll('[data-content]').forEach(el => {
    const key = el.getAttribute('data-content');
    if (Object.prototype.hasOwnProperty.call(projectContent, key)) {
      el.innerHTML = projectContent[key];
    }
  });

  // Build mood cards from moodOptions
  const moodContainer = document.getElementById('mood-grid-container');
  if (moodContainer && projectContent.moodOptions) {
    moodContainer.innerHTML = projectContent.moodOptions.map(opt => `
      <button class="mood-card" type="button" role="radio" aria-checked="false" data-mood="${opt.id}">
        <span class="mood-emoji" aria-hidden="true">${opt.emoji}</span>

// ═══════════════════════════════════════════
// PART 3: APP LOGIC
// ═══════════════════════════════════════════

const state = {
  mood: null,
  age: null,
  retireAge: null,
  income: null,
  savings: null,
  monthly: null
};

const MONTHLY_RATE = 0.07 / 12;

// ─── Number helpers ───
function fmtCurrency(n) {
  const v = Math.max(0, Math.round(n));
  return '$' + v.toLocaleString('en-US');
}
function fmtCurrencyCompact(n) {
  const v = Math.max(0, Math.round(n));
  if (v >= 1_000_000) {
    return '$' + (v / 1_000_000).toFixed(v >= 10_000_000 ? 1 : 2).replace(/\.?0+$/, '') + 'M';
  }
  if (v >= 1_000) {
    return '$' + Math.round(v / 1_000).toLocaleString('en-US') + 'K';
  }
  return fmtCurrency(v);
}
function parseCurrency(s) {
  if (s == null) return NaN;
  const cleaned = String(s).replace(/[^0-9.]/g, '');
  if (!cleaned) return NaN;
  return parseFloat(cleaned);
}
function formatCurrencyInput(s) {
  const cleaned = String(s).replace(/[^0-9]/g, '');
  if (!cleaned) return '';
  return parseInt(cleaned, 10).toLocaleString('en-US');
}

// ─── Math ───
function projectedFutureValue(currentSavings, monthlyContribution, years) {
  if (years <= 0) return currentSavings;
  const months = Math.round(years * 12);
  let balance = currentSavings;
  for (let i = 0; i < months; i++) {
    balance = balance * (1 + MONTHLY_RATE);
    balance += monthlyContribution; // contributions at end of period
  }
  return balance;
}

function computeBaseFigures() {
  const annualIncome = state.income;
  const monthlySavings = state.monthly;
  const annualSavings = monthlySavings * 12;
  const annualExpenses = Math.max(0, annualIncome - annualSavings);
  const target = annualExpenses * 25;
  const yearsRemaining = Math.max(0, state.retireAge - state.age);
  const projected = projectedFutureValue(state.savings, monthlySavings, yearsRemaining);
  const pct = target > 0 ? (projected / target) * 100 : 0;
  return { annualIncome, monthlySavings, annualSavings, annualExpenses, target, yearsRemaining, projected, pct };
}

// ─── Screen transitions ───
function showScreen(idx) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById('screen-' + idx);
  if (target) {
    target.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'instant' });
    const focusable = target.querySelector('input, button:not([disabled])');
    if (focusable && idx > 0) {
      // small delay so animation doesn't fight focus
      setTimeout(() => focusable.focus({ preventScroll: true }), 80);
    }
  }
}

// ─── Wire up navigation buttons ───
function wireNavButtons() {
  document.querySelectorAll('[data-goto]').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = parseInt(btn.getAttribute('data-goto'), 10);
      if (!Number.isNaN(target)) showScreen(target);
    });
  });
}

// ─── Mood selection ───
function wireMoodCards() {
  const cards = document.querySelectorAll('.mood-card');
  cards.forEach(card => {
    card.addEventListener('click', () => {
      cards.forEach(c => c.setAttribute('aria-checked', 'false'));
      card.setAttribute('aria-checked', 'true');
      state.mood = card.getAttribute('data-mood');
      // small delay so the user sees the selection register
      setTimeout(() => showScreen(2), 220);
    });
  });
}

// ─── Age screen ───
function wireAgeScreen() {
  const ageInput = document.getElementById('input-age');
  const retireInput = document.getElementById('input-retire-age');
  const nextBtn = document.getElementById('age-next');
  const errorEl = document.getElementById('age-error');

  function digitsOnly(input) {
    input.addEventListener('input', () => {
      input.value = input.value.replace(/[^0-9]/g, '').slice(0, 2);
      validateAge();
    });
  }

  function validateAge() {
    const a = parseInt(ageInput.value, 10);
    const r = parseInt(retireInput.value, 10);
    let msg = '';
    let valid = false;

    if (!ageInput.value || !retireInput.value) {
      msg = '';
    } else if (Number.isNaN(a) || a < 18 || a > 90) {
      msg = 'Enter an age between 18 and 90.';
    } else if (Number.isNaN(r) || r < a + 1 || r > 90) {
      msg = 'Pick a retirement age that is later than your current age.';
    } else {
      valid = true;
    }

    errorEl.textContent = msg;
    nextBtn.disabled = !valid;
    if (valid) {
      state.age = a;
      state.retireAge = r;
    }
  }

  digitsOnly(ageInput);
  digitsOnly(retireInput);
  ageInput.addEventListener('blur', validateAge);
  retireInput.addEventListener('blur', validateAge);

  retireInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !nextBtn.disabled) showScreen(3);
  });
  ageInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') retireInput.focus();
  });
}

// ─── Currency screens (income, savings, monthly) ───
function wireCurrencyScreen({ inputId, nextId, errorId, stateKey, onNext, min, max }) {
  const input = document.getElementById(inputId);
  const nextBtn = document.getElementById(nextId);
  const errorEl = document.getElementById(errorId);

  function validate() {
    const formatted = formatCurrencyInput(input.value);
    if (formatted !== input.value) {
      const cursorEnd = formatted.length;
      input.value = formatted;
      try { input.setSelectionRange(cursorEnd, cursorEnd); } catch (e) {}
    }
    const v = parseCurrency(input.value);
    let msg = '';
    let valid = false;
    if (!input.value) {
      msg = '';
    } else if (Number.isNaN(v) || v < min) {
      msg = `Enter a number of at least ${fmtCurrency(min)}.`;
    } else if (v > max) {
      msg = `That's higher than this tool handles. Try a smaller number.`;
    } else {
      valid = true;
    }
    errorEl.textContent = msg;
    nextBtn.disabled = !valid;
    if (valid) state[stateKey] = v;
  }

  input.addEventListener('input', validate);
  input.addEventListener('blur', validate);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !nextBtn.disabled) {
      if (typeof onNext === 'function') onNext();
    }
  });
  if (typeof onNext === 'function') {
    nextBtn.addEventListener('click', onNext);
  }
}

// ─── Verdict copy ───
function buildVerdict(figures) {
  const { projected, target, pct } = figures;
  const tier = pct >= 100 ? 'ahead' : pct >= 85 ? 'close' : 'behind';
  const mood = (state.mood === 'behind' || state.mood === 'ontrack') ? state.mood : 'unsure';
  const head = projectContent[`verdictHead_${tier}_${mood}`];
  const body = projectContent[`verdictBody_${tier}`]
    .split('{projected}').join(fmtCurrencyCompact(projected))
    .split('{target}').join(fmtCurrencyCompact(target));
  return { head, body, pctRounded: Math.round(pct) };
}

function applyTone(pct) {
  const ring = document.getElementById('ring-fill');
  ring.classList.remove('tone-green', 'tone-amber', 'tone-ink');
  if (pct >= 100) ring.classList.add('tone-green');
  else if (pct >= 85) ring.classList.add('tone-amber');
  else ring.classList.add('tone-ink');
}

function setRing(pct) {
  const ring = document.getElementById('ring-fill');
  const r = 96;
  const circumference = 2 * Math.PI * r; // 603.18...
  const clamped = Math.max(0, Math.min(100, pct));
  const offset = circumference * (1 - clamped / 100);
  ring.setAttribute('stroke-dasharray', circumference.toFixed(2));
  ring.setAttribute('stroke-dashoffset', offset.toFixed(2));
  applyTone(pct);
  document.getElementById('ring-pct').textContent = Math.round(clamped) + '%';
}

// ─── Results render ───
function renderResults() {
  const f = computeBaseFigures();

  // Fine print breakdown
  document.getElementById('calc-income').textContent = fmtCurrency(f.annualIncome);
  document.getElementById('calc-savings').textContent = fmtCurrency(f.annualSavings) + ' / yr';
  document.getElementById('calc-expenses').textContent = fmtCurrency(f.annualExpenses) + ' / yr';
  document.getElementById('calc-target').textContent = fmtCurrency(f.target);
  document.getElementById('calc-projected').textContent = fmtCurrency(f.projected);

  // Verdict
  const v = buildVerdict(f);
  document.getElementById('verdict-headline').textContent = v.head;
  document.getElementById('verdict-body').textContent = v.body;

  // Ring
  setRing(f.pct);

  // Initialize sliders to current values
  const saveSlider = document.getElementById('save-slider');
  const timeSlider = document.getElementById('time-slider');
  const ptSlider = document.getElementById('parttime-slider');

  saveSlider.value = state.monthly;
  saveSlider.max = Math.max(6000, Math.round(state.monthly * 3));
  timeSlider.value = state.retireAge;
  timeSlider.min = Math.max(50, state.age + 1);
  timeSlider.max = Math.max(state.retireAge + 10, 80);
  ptSlider.value = 0;
  ptSlider.max = Math.max(60000, Math.round(f.annualExpenses * 0.6));

  updateStrategy();
}

function updateStrategy() {
  const saveVal = parseInt(document.getElementById('save-slider').value, 10);
  const timeVal = parseInt(document.getElementById('time-slider').value, 10);
  const ptVal = parseInt(document.getElementById('parttime-slider').value, 10);

  document.getElementById('save-slider-value').textContent = fmtCurrency(saveVal) + ' / mo';
  document.getElementById('time-slider-value').textContent = timeVal;
  document.getElementById('parttime-slider-value').textContent = fmtCurrency(ptVal) + ' / yr';

  document.getElementById('summary-save').textContent = fmtCurrency(saveVal) + ' / mo';
  document.getElementById('summary-age').textContent = timeVal;
  document.getElementById('summary-pt').textContent = fmtCurrency(ptVal) + ' / yr';

  const annualSavings = saveVal * 12;
  const annualExpenses = Math.max(0, state.income - annualSavings);
  const adjustedTarget = Math.max(0, (annualExpenses - ptVal) * 25);
  const yearsRemaining = Math.max(0, timeVal - state.age);
  const adjProjected = projectedFutureValue(state.savings, saveVal, yearsRemaining);
  const adjPct = adjustedTarget > 0 ? (adjProjected / adjustedTarget) * 100 : 999;

  document.getElementById('summary-result').textContent =
    fmtCurrency(adjProjected) + ' (' + Math.round(adjPct) + '% of ' + fmtCurrencyCompact(adjustedTarget) + ')';

  setRing(adjPct);
}

function wireResultsSliders() {
  ['save-slider', 'time-slider', 'parttime-slider'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', updateStrategy);
  });
}

// ─── Action cards ───
function wireActionCards() {
  document.getElementById('action-save').addEventListener('click', () => {
    window.print();
  });
  document.getElementById('action-send').addEventListener('click', () => {
    const form = document.getElementById('send-form');
    form.classList.add('active');
    form.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setTimeout(() => document.getElementById('send-name').focus(), 320);
  });
  document.getElementById('send-cancel').addEventListener('click', () => {
    document.getElementById('send-form').classList.remove('active');
  });
  document.getElementById('send-submit').addEventListener('click', () => {
    const name = document.getElementById('send-name').value.trim();
    const email = document.getElementById('send-email').value.trim();
    const note = document.getElementById('send-note').value.trim();
    const f = computeBaseFigures();
    const v = buildVerdict(f);

    const lines = [
      `Name: ${name || '(not provided)'}`,
      `From: ${email || '(not provided)'}`,
      '',
      `Headline: ${v.head}`,
      `Funded: ${Math.round(f.pct)}%`,
      '',
      `Age: ${state.age}`,
      `Target retirement age: ${state.retireAge}`,
      `Annual income: ${fmtCurrency(f.annualIncome)}`,
      `Current savings: ${fmtCurrency(state.savings)}`,
      `Monthly savings: ${fmtCurrency(state.monthly)}`,
      `Estimated annual spending: ${fmtCurrency(f.annualExpenses)}`,
      `Target (25× spending): ${fmtCurrency(f.target)}`,
      `Projected by retirement: ${fmtCurrency(f.projected)}`,
      `Gut check: ${state.mood}`,
      ''
    ];
    if (note) {
      lines.push('What I want to discuss on the call:');
      lines.push(note);
    }

    const subject = encodeURIComponent(projectContent.emailSubject);
    const bodyTxt = encodeURIComponent(lines.join('\n'));
    window.location.href = `mailto:marcus@example.com?subject=${subject}&body=${bodyTxt}`;
  });
}

// ─── Boot ───
document.addEventListener('DOMContentLoaded', () => {
  renderContent();
  wireNavButtons();
  wireMoodCards();
  wireAgeScreen();

  wireCurrencyScreen({
    inputId: 'input-income',
    nextId: 'income-next',
    errorId: 'income-error',
    stateKey: 'income',
    onNext: () => showScreen(5),
    min: 1000,
    max: 10_000_000
  });
  wireCurrencyScreen({
    inputId: 'input-savings',
    nextId: 'savings-next',
    errorId: 'savings-error',
    stateKey: 'savings',
    onNext: () => showScreen(6),
    min: 0,
    max: 100_000_000
  });
  wireCurrencyScreen({
    inputId: 'input-monthly',
    nextId: 'monthly-next',
    errorId: 'monthly-error',
    stateKey: 'monthly',
    onNext: () => {
      // Run loading screen, then results
      showScreen(7);
      setTimeout(() => {
        renderResults();
        showScreen(8);
      }, 1400);
    },
    min: 0,
    max: 100_000
  });

  wireResultsSliders();
  wireActionCards();
});
</script>
