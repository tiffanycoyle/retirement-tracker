<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Readiness | Marcus Cole</title>
    <meta name="description" content="Find out where you stand for retirement in under 2 minutes. Put in your numbers, get a real answer, and bring it to your call with Marcus.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Literata:opsz,wght@7..72,400;7..72,600;7..72,700&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════════════════════════════
           DESIGN TOKENS
           ═══════════════════════════════════════════ */
        :root {
            /* Risk Colors */
            --critical: #B91C1C;
            --critical-soft: #fef2f2;
            --critical-light: #fca5a5;
            --high: #ea580c;
            --medium: #92400E;
            --medium-soft: #fefce8;
            --low: #166534;

            /* Surface & Text (warm linen palette) */
            --bg: #FAF8F5;
            --surface: #ffffff;
            --surface-hover: #F5F1EC;
            --border: #E2DCD5;
            --border-strong: #C9C1B6;
            --text: #2C2520;
            --muted: #6B5E52;
            --remediation-bg: #EEF5F0;
            --focus-ring: 0 0 0 3px rgba(45, 90, 61, 0.35);

            /* Spacing */
            --space-xs: 8px;
            --space-sm: 12px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 48px;
            --space-3xl: 64px;

            /* Typography — Literata (headings) + Atkinson Hyperlegible (body) */
            --font-heading: "Literata", Georgia, serif;
            --font: "Atkinson Hyperlegible Next", -apple-system, sans-serif;
            --text-xs: 0.75rem;
            --text-sm: 0.875rem;
            --text-base: 1rem;
            --text-lg: 1.25rem;
            --text-xl: 1.75rem;
            --text-2xl: 2rem;
            --text-3xl: clamp(2rem, 5vw, 2.75rem);

            /* Animation */
            --ease-out: cubic-bezier(0.25, 1, 0.5, 1);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ═══════════════════════════════════════════
           BASE RESET & LAYOUT
           ═══════════════════════════════════════════ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            font-size: var(--text-base);
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-lg);
        }

        main {
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 520px;
            min-height: 560px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: var(--space-2xl) var(--space-xl);
            box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 4px 16px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            /* no transition on max-width — causes layout thrash */
        }

        /* Wider card for results screen — content drives the height */
        body:has(#screen-8.active) {
            align-items: flex-start;
            padding-top: var(--space-2xl);
            padding-bottom: var(--space-2xl);
        }

        body:has(#screen-8.active) main {
            max-width: 860px;
            min-height: 0;
        }

        h1, h2, h3, .font-heading {
            font-family: var(--font-heading);
            font-weight: 600;
            color: var(--text);
            line-height: 1.2;
        }

        /* ═══════════════════════════════════════════
           BRAND LOGO (Marcus Cole monogram)
           ═══════════════════════════════════════════ */
        .brand-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto var(--space-lg);
            background: linear-gradient(145deg, #166534 0%, #14532d 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: var(--font-heading);
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.01em;
            line-height: 1;
            box-shadow: 0 1px 2px rgba(20, 83, 45, 0.18), 0 4px 12px rgba(20, 83, 45, 0.18);
        }

        /* Card divider */
        .card-divider {
            height: 1px;
            background: var(--border);
            margin: var(--space-md) 0;
            border: none;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* ═══════════════════════════════════════════
           PROGRESS BAR
           ═══════════════════════════════════════════ */
        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--text);
            border-radius: 16px 0 0 0;
            transition: width 400ms var(--ease-out);
            width: 0;
        }

        /* Hide on opener and results */
        body:has(#screen-0.active) .progress-bar,
        body:has(#screen-7.active) .progress-bar,
        body:has(#screen-8.active) .progress-bar { opacity: 0; }

        /* ═══════════════════════════════════════════
           SCREEN TRANSITIONS
           ═══════════════════════════════════════════ */
        .screen {
            display: none;
            opacity: 0;
            animation: fadeIn 400ms var(--ease-out) forwards;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            flex: 1;
            width: 100%;
        }

        /* Results screen: keep block flow */
        #screen-8.active {
            display: block;
            flex: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ═══════════════════════════════════════════
           BUTTONS
           ═══════════════════════════════════════════ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: var(--space-sm) var(--space-xl);
            font-family: var(--font);
            font-size: var(--text-base);
            font-weight: 500;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 200ms var(--ease-out);
        }

        .btn:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.35; pointer-events: none; }

        .btn-primary {
            background: var(--text);
            color: var(--bg);
            width: 100%;
            min-height: 52px;
            border-radius: 8px;
        }

        .btn-primary:hover {
            background: #292524;
        }

        .btn-secondary {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--surface);
            color: var(--text);
        }

        .btn-full {
            width: 100%;
        }

        /* Results screen overrides — buttons can be auto width */
        #screen-8 .btn { width: auto; }

        /* ═══════════════════════════════════════════
           BACK ARROW
           ═══════════════════════════════════════════ */
        .back-arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border: 1px solid var(--border);
            background: none;
            cursor: pointer;
            color: var(--muted);
            font-size: 1.1rem;
            border-radius: 8px;
            margin-bottom: var(--space-lg);
            transition: all 180ms var(--ease-out);
            align-self: flex-start;
        }

        .back-arrow:hover {
            background: var(--surface);
            color: var(--text);
        }

        .back-arrow:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        /* ═══════════════════════════════════════════
           SCREEN 0: OPENER (centered card)
           ═══════════════════════════════════════════ */
        .opener {
            display: flex;
            flex-direction: column;
            flex: 1;
            text-align: center;
        }

        .opener .card-divider {
            margin-top: auto;
        }

        .opener h1 {
            font-size: var(--text-2xl);
            margin-bottom: var(--space-sm);
            line-height: 1.15;
            letter-spacing: -0.01em;
        }

        .opener-body {
            color: var(--muted);
            font-size: var(--text-base);
            margin: 0 auto var(--space-md);
            max-width: 380px;
        }

        .opener-meta {
            display: flex;
            justify-content: center;
            gap: var(--space-lg);
            margin-top: var(--space-md);
            font-size: var(--text-sm);
            color: var(--muted);
        }

        .opener-meta span::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border-strong);
            margin-right: var(--space-xs);
            vertical-align: middle;
        }

        /* ═══════════════════════════════════════════
           SCREEN 1: GUT CHECK
           ═══════════════════════════════════════════ */
        .eyebrow {
            font-size: var(--text-xs);
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: var(--space-sm);
            text-align: center;
        }

        .question-label {
            font-size: var(--text-lg);
            margin-bottom: var(--space-lg);
            text-align: center;
            line-height: 1.35;
        }

        .helper-text {
            font-size: var(--text-sm);
            color: var(--muted);
            margin-top: var(--space-md);
            text-align: center;
        }

        .mood-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-sm);
        }

        .mood-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-xs);
            min-height: 104px;
            padding: var(--space-md);
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            cursor: pointer;
            transition: all 180ms var(--ease-out);
            font-family: var(--font);
        }

        .mood-card:hover {
            background: var(--surface-hover);
            border-color: var(--border-strong);
        }

        .mood-card[aria-checked="true"] {
            border-color: var(--text);
            background: var(--surface);
            box-shadow: 0 0 0 1px var(--text);
        }

        .mood-card:active { transform: scale(0.98); }

        .mood-card:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        .mood-emoji { font-size: 2rem; }
        .mood-label { font-weight: 600; font-size: var(--text-sm); }

        /* ═══════════════════════════════════════════
           SCREEN 2: SENTENCE COMPLETION
           ═══════════════════════════════════════════ */
        .step-counter {
            font-size: var(--text-xs);
            color: var(--muted);
            margin-bottom: var(--space-lg);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .step-counter .current-num {
            color: var(--text);
            font-weight: 600;
        }

        .sentence-block {
            margin-bottom: var(--space-lg);
            text-align: center;
        }

        .sentence-line {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            justify-content: center;
            gap: var(--space-xs);
            font-family: var(--font);
            font-size: var(--text-xl);
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: var(--space-sm);
        }

        .sentence-input {
            width: 76px;
            font-family: var(--font);
            font-size: var(--text-xl);
            font-weight: 600;
            color: var(--text);
            background: none;
            border: none;
            border-bottom: 2px solid var(--border-strong);
            padding: 0 2px 2px;
            text-align: center;
            transition: border-color 200ms var(--ease-out);
        }

        .sentence-input:hover {
            border-bottom-color: var(--muted);
        }

        .sentence-input:focus {
            outline: none;
            border-bottom-color: var(--text);
        }

        .sentence-input:focus-visible {
            box-shadow: var(--focus-ring);
            border-radius: 2px;
        }

        .sentence-input::placeholder {
            color: var(--border-strong);
        }

        /* ═══════════════════════════════════════════
           SCREEN 3: INTERSTITIAL
           ═══════════════════════════════════════════ */
        .interstitial {
            display: flex;
            flex-direction: column;
            flex: 1;
            text-align: center;
        }

        .interstitial .card-divider {
            margin-top: auto;
        }

        .interstitial h2 {
            font-size: var(--text-2xl);
            margin-bottom: var(--space-sm);
            line-height: 1.15;
            letter-spacing: -0.01em;
            opacity: 0;
            animation: fadeInSlow 600ms var(--ease-out-expo) 100ms forwards;
        }

        .interstitial p {
            color: var(--muted);
            font-size: var(--text-base);
            margin: 0 auto;
            max-width: 420px;
            opacity: 0;
            animation: fadeInSlow 600ms var(--ease-out-expo) 350ms forwards;
        }

        .interstitial .btn {
            opacity: 0;
            animation: fadeInSlow 400ms var(--ease-out) 600ms forwards;
        }

        @keyframes fadeInSlow {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ═══════════════════════════════════════════
           SCREENS 4-6: CURRENCY INPUTS
           ═══════════════════════════════════════════ */
        .currency-wrap {
            position: relative;
            margin-top: var(--space-md);
        }

        .currency-symbol {
            position: absolute;
            left: var(--space-lg);
            top: 50%;
            transform: translateY(-50%);
            font-size: var(--text-lg);
            font-weight: 400;
            color: var(--muted);
            pointer-events: none;
        }

        .currency-input {
            width: 100%;
            font-family: var(--font);
            font-size: var(--text-lg);
            font-weight: 400;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: var(--space-md) var(--space-lg) var(--space-md) 44px;
            min-height: 56px;
            text-align: center;
            transition: all 200ms var(--ease-out);
        }

        .currency-input:hover {
            border-color: var(--border-strong);
        }

        .currency-input:focus {
            outline: none;
            border-color: var(--muted);
            box-shadow: var(--focus-ring);
            background: var(--surface);
        }

        .currency-input::placeholder {
            color: var(--border-strong);
        }

        .nav-buttons {
            margin-top: auto;
            padding-top: var(--space-lg);
            border-top: 1px solid var(--border);
        }

        .error-msg {
            font-size: var(--text-sm);
            color: var(--critical);
            margin-top: var(--space-xs);
            min-height: 1.2em;
            text-align: center;
        }

        /* ═══════════════════════════════════════════
           SCREEN 7: LOADING
           ═══════════════════════════════════════════ */
        .loading-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .loading-dots {
            display: flex;
            gap: 6px;
            margin-bottom: var(--space-lg);
        }

        .loading-dots span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--muted);
            animation: pulse 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
            40% { opacity: 1; transform: scale(1); }
        }

        .loading-label {
            font-family: var(--font);
            font-size: var(--text-lg);
            color: var(--muted);
            opacity: 0;
            animation: fadeInSlow 500ms var(--ease-out) 400ms forwards;
        }

        /* ═══════════════════════════════════════════
           SCREEN 8: RESULTS
           ═══════════════════════════════════════════ */

        /* Print header (hidden on screen) */
        .print-header { display: none; }

        /* Progress Ring */
        .results-hero {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-xl);
            margin-bottom: var(--space-3xl);
        }

        .results-hero .ring-section {
            margin-bottom: 0;
            flex-shrink: 0;
        }

        .results-hero .verdict-section {
            margin-bottom: 0;
            text-align: center;
            flex: 1;
            min-width: 0;
        }

        .results-hero .verdict-title {
            font-size: var(--text-2xl);
        }

        .results-hero .verdict-body {
            font-size: var(--text-sm);
            max-width: 420px;
            margin: 0 auto;
        }

        .ring-section {
            text-align: center;
            margin-bottom: var(--space-3xl);
        }

        .vault-wrap {
            width: 180px;
            filter: drop-shadow(0 8px 18px rgba(44, 37, 32, 0.12));
        }
        .vault-frame {
            fill: var(--border);
            stroke: var(--border-strong);
            stroke-width: 2;
        }
        .vault-interior {
            fill: var(--surface);
            stroke: var(--border-strong);
            stroke-width: 1.5;
        }
        .vault-bolt {
            fill: var(--border-strong);
            stroke: var(--muted);
            stroke-width: 1;
        }
        .vault-fill-rect {
            fill: url(#vaultGrad);
        }
        .vault-label {
            fill: var(--muted);
            font-family: var(--font);
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }
        .vault-chip {
            fill: color-mix(in srgb, var(--surface) 90%, transparent);
            stroke: var(--border);
            stroke-width: 1;
        }
        .vault-chip-text {
            fill: var(--text);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 700;
        }

        /* Verdict */
        .verdict-section {
            margin-bottom: var(--space-3xl);
        }

        .verdict-title {
            font-size: var(--text-3xl);
            margin-bottom: var(--space-md);
            line-height: 1.15;
        }

        .verdict-body {
            color: var(--muted);
            line-height: 1.7;
        }

        /* Two-column layout: Starting Point + Strategy */
        .results-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-xl);
            align-items: start;
            margin-bottom: var(--space-2xl);
        }

        .results-columns .explainer-section,
        .results-columns .strategy-section {
            margin-bottom: 0;
        }

        /* Explainer / Math Breakdown */
        .explainer-section {
            margin-bottom: var(--space-3xl);
        }

        .explainer-title {
            font-size: var(--text-lg);
            margin-bottom: var(--space-md);
        }

        .calc-table {
            width: 100%;
            border-collapse: collapse;
        }

        .calc-table tr {
            border-bottom: 1px solid var(--border);
        }

        .calc-table td {
            padding: var(--space-sm) 0;
            vertical-align: top;
        }

        .calc-table td:first-child {
            color: var(--muted);
            font-size: var(--text-sm);
            padding-right: var(--space-md);
        }

        .calc-table td:last-child {
            text-align: right;
            font-weight: 600;
            white-space: nowrap;
        }

        /* Strategy Section */
        .strategy-section {
            margin-bottom: var(--space-2xl);
        }

        .strategy-section-title {
            font-size: var(--text-lg);
            margin-bottom: var(--space-md);
        }

        .strategy-card {
            background: var(--surface);
            border-radius: 6px;
            padding: var(--space-lg);
            margin-bottom: var(--space-md);
            border: 1px solid var(--border);
        }

        .strategy-card-title {
            font-family: var(--font);
            font-weight: 600;
            font-size: var(--text-base);
            margin-bottom: var(--space-md);
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: var(--text-sm);
            color: var(--muted);
            margin-bottom: var(--space-xs);
        }

        .slider-value {
            font-weight: 600;
            color: var(--text);
        }

        .strategy-slider {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .strategy-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--text);
            border: 3px solid var(--bg);
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            cursor: pointer;
            /* 44px touch target via transparent border padding */
            background-clip: padding-box;
        }

        .strategy-slider::-moz-range-thumb {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--text);
            border: 3px solid var(--bg);
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        /* Ensure 44px touch area on the track itself */
        .strategy-slider {
            padding: 10px 0;
            margin: -10px 0;
        }

        .strategy-slider:focus-visible {
            box-shadow: var(--focus-ring);
            border-radius: 3px;
        }

        .slider-helper {
            font-size: var(--text-sm);
            color: var(--muted);
            margin-top: var(--space-sm);
        }

        /* Summary Card */
        .summary-card {
            background: var(--surface);
            color: var(--text);
            border-radius: 6px;
            padding: var(--space-lg);
            margin-top: var(--space-md);
            margin-bottom: 0;
            border: 1px solid var(--border);
        }

        .summary-card-title {
            font-family: var(--font);
            font-weight: 600;
            font-size: var(--text-base);
            margin-bottom: var(--space-md);
            color: var(--muted);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: var(--space-xs) 0;
            font-size: var(--text-sm);
            border-bottom: 1px solid var(--border);
        }

        .summary-row:last-child {
            border-bottom: none;
            padding-top: var(--space-sm);
            font-size: var(--text-base);
            font-weight: 600;
        }

        .summary-row-label { color: var(--muted); }

        .summary-result-pct {
            font-family: var(--font);
            font-weight: 700;
        }

        /* Fine Print */
        .fine-print-section {
            margin-bottom: var(--space-lg);
        }

        .fine-print-toggle {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            font-size: var(--text-sm);
            color: var(--muted);
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font);
            padding: var(--space-sm) 0;
            min-height: 44px;
        }

        .fine-print-toggle:hover { color: var(--text); }
        .fine-print-toggle:focus-visible { outline: none; box-shadow: var(--focus-ring); }

        .fine-print-toggle::before {
            content: '▸';
            display: inline-block;
            transition: transform 200ms var(--ease-out);
        }

        .fine-print-toggle[aria-expanded="true"]::before {
            transform: rotate(90deg);
        }

        .fine-print-body {
            display: none;
            padding: var(--space-md) 0;
        }

        .fine-print-body.open { display: block; }

        .fine-print-row {
            display: flex;
            justify-content: space-between;
            padding: var(--space-xs) 0;
            font-size: var(--text-sm);
            color: var(--muted);
        }

        .fine-print-row span:last-child { font-weight: 600; color: var(--text); }

        /* Actions */
        .actions-section {
            margin-bottom: var(--space-2xl);
        }

        .actions-title {
            font-size: var(--text-2xl);
            margin-bottom: var(--space-xs);
        }

        .actions-intro {
            font-size: var(--text-sm);
            color: var(--muted);
            margin-bottom: var(--space-lg);
        }

        .action-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
        }

        .action-card {
            background: var(--surface);
            border-radius: 6px;
            padding: var(--space-lg);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 180ms var(--ease-out);
            text-align: left;
            font-family: var(--font);
        }

        .action-card:hover {
            border-color: var(--border-strong);
            background: var(--surface-hover);
        }

        .action-card:active {
            transform: scale(0.98);
        }

        .action-card:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        .action-card-icon {
            width: 24px;
            height: 24px;
            margin-bottom: var(--space-sm);
            color: var(--muted);
        }

        .action-card:hover .action-card-icon {
            color: var(--text);
        }

        .action-card-title {
            font-family: var(--font);
            font-weight: 600;
            margin-bottom: var(--space-xs);
        }

        .action-card-desc {
            font-size: var(--text-sm);
            color: var(--muted);
            line-height: 1.5;
        }

        /* Send Form */
        .send-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(28, 25, 23, 0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .send-overlay.open {
            display: flex;
        }

        .send-form-card {
            background: var(--bg);
            border-radius: 6px;
            padding: var(--space-2xl) var(--space-lg) var(--space-lg);
            width: 100%;
            max-width: 520px;
            max-height: 90dvh;
            overflow-y: auto;
            animation: slideUp 300ms var(--ease-out);
            margin: var(--space-lg);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .send-form-title {
            font-size: var(--text-xl);
            margin-bottom: var(--space-xs);
        }

        .send-form-intro {
            font-size: var(--text-sm);
            color: var(--muted);
            margin-bottom: var(--space-lg);
        }

        .form-group {
            margin-bottom: var(--space-md);
        }

        .form-label {
            display: block;
            font-size: var(--text-sm);
            font-weight: 500;
            margin-bottom: var(--space-xs);
        }

        .form-input {
            width: 100%;
            font-family: var(--font);
            font-size: var(--text-base);
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: var(--space-sm) var(--space-md);
            min-height: 44px;
            transition: border-color 200ms var(--ease-out);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--muted);
            box-shadow: var(--focus-ring);
        }

        textarea.form-input {
            min-height: 80px;
            resize: vertical;
        }

        .form-buttons {
            display: flex;
            gap: var(--space-md);
            margin-top: var(--space-lg);
        }

        .send-success {
            display: none;
            text-align: center;
            padding: var(--space-2xl) 0;
        }

        .send-success.show { display: block; }

        .send-success-check {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--remediation-bg);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--space-md);
            font-size: 1.5rem;
        }

        /* Footer */
        .results-footer {
            text-align: center;
            padding: var(--space-xl) 0;
            border-top: 1px solid var(--border);
        }

        .results-footer p {
            color: var(--muted);
            font-size: var(--text-sm);
            margin-bottom: var(--space-xs);
        }

        .results-footer .cta-ready {
            font-family: var(--font);
            font-weight: 600;
            font-size: var(--text-base);
            color: var(--text);
        }

        /* ═══════════════════════════════════════════
           REDUCED MOTION
           ═══════════════════════════════════════════ */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Staggered results reveal */
        .reveal {
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 500ms var(--ease-out-expo), transform 500ms var(--ease-out-expo);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Edit numbers link */
        .edit-numbers {
            display: inline-block;
            font-size: var(--text-sm);
            color: var(--muted);
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font);
            padding: var(--space-xs) 0;
            margin-bottom: var(--space-lg);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .edit-numbers:hover { color: var(--text); }
        .edit-numbers:focus-visible { outline: none; box-shadow: var(--focus-ring); }

        /* Results screen — left-aligned, wider card layout */
        #screen-8 .explainer-title,
        #screen-8 .strategy-section-title,
        #screen-8 .actions-title,
        #screen-8 .actions-intro,
        #screen-8 .summary-card-title { text-align: left; }

        #screen-8 .ring-section { text-align: center; }

        /* ═══════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════ */
        @media (max-width: 640px) {
            .results-hero {
                flex-direction: column;
            }

            .vault-wrap { width: 160px; }

            .results-hero .verdict-title {
                font-size: var(--text-xl);
            }

            .results-hero .verdict-body {
                max-width: none;
            }

            .results-columns {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: var(--space-sm);
            }

            main {
                padding: var(--space-xl) var(--space-lg);
                border-radius: 12px;
                min-height: 480px;
            }

            .brand-logo {
                width: 56px;
                height: 56px;
                font-size: 22px;
            }

            .opener h1,
            .interstitial h2 {
                font-size: var(--text-xl);
            }

            .mood-grid {
                grid-template-columns: 1fr 1fr 1fr;
                gap: var(--space-xs);
            }

            .mood-card {
                min-height: 88px;
                padding: var(--space-sm);
            }

            .sentence-line {
                font-size: var(--text-lg);
            }

            .sentence-input {
                font-size: var(--text-lg);
                width: 64px;
            }

            .action-cards {
                grid-template-columns: 1fr;
            }

            .vault-wrap {
                width: 150px;
            }
        }

        /* ═══════════════════════════════════════════
           PRINT STYLES
           ═══════════════════════════════════════════ */
        @media print {
            @page { margin: 0.6in; size: letter; }

            body {
                background: white;
                display: block;
                padding: 0;
                font-size: 14px;
                line-height: 1.5;
            }

            main {
                max-width: 100%;
                border: none;
                box-shadow: none;
                border-radius: 0;
                padding: 0;
            }

            /* Print header */
            .print-header {
                display: block;
                text-align: center;
                margin-bottom: 20px;
                padding-bottom: 12px;
                border-bottom: 2px solid var(--text);
            }
            .print-header h1 { font-size: 22px; margin-bottom: 4px; }
            .print-header p { font-size: 13px; color: var(--muted); }

            /* Hide interactive elements */
            .edit-numbers,
            .strategy-section,
            .actions-section,
            .send-overlay,
            .results-footer,
            .progress-bar { display: none !important; }

            /* Hero: vault + verdict side by side */
            .results-hero {
                flex-direction: row;
                align-items: center;
                gap: 24px;
                margin-bottom: 24px;
            }
            .results-hero .ring-section { margin-bottom: 0; }
            .vault-wrap { width: 160px; filter: none; }
            .vault-chip-text { font-size: 13px; }
            .vault-label { font-size: 10px; }
            .results-hero .verdict-title { font-size: 20px; margin-bottom: 6px; }
            .results-hero .verdict-body { font-size: 14px; line-height: 1.5; }

            /* Two-column: explainer + summary side by side */
            .results-columns {
                grid-template-columns: 1fr 1fr;
                gap: 24px;
                margin-bottom: 16px;
            }

            .explainer-title { font-size: 16px; margin-bottom: 8px; }
            .calc-table td { padding: 5px 0; font-size: 14px; }
            .calc-table td:first-child { font-size: 13px; }

            /* Summary card */
            .summary-card {
                box-shadow: none;
                border: 1px solid var(--border);
                padding: 14px 16px;
                margin-top: 0;
            }
            .summary-card-title { font-size: 14px; margin-bottom: 8px; }
            .summary-row { padding: 4px 0; font-size: 13px; }
            .summary-row:last-child { font-size: 14px; padding-top: 6px; }

            /* Fine print: force open for print */
            .fine-print-toggle { display: none; }
            .fine-print-body { display: block !important; padding: 6px 0; }
            .fine-print-section { margin-bottom: 12px; }
            .fine-print-row { padding: 3px 0; font-size: 13px; }

            /* Prevent page breaks inside sections */
            .results-hero,
            .explainer-section,
            .summary-card,
            .fine-print-section { break-inside: avoid; }

            /* Kill animations and reveals */
            .reveal { opacity: 1 !important; transform: none !important; }
        }
    </style>
</head>

<body>
    <main>
        <div class="progress-bar" id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>

        <!-- ═══ SCREEN 0: OPENER ═══ -->
        <section class="screen active" id="screen-0">
            <div class="opener">
                <div class="brand-logo" aria-label="Marcus Cole">MC</div>
                <h1 data-content="openerTitle"></h1>
                <p class="opener-body" data-content="openerBody"></p>
                <hr class="card-divider">
                <button class="btn btn-primary" type="button" id="start-btn" data-content="btnStart"></button>
                <div class="opener-meta">
                    <span data-content="metaTime"></span>
                    <span data-content="metaQuestions"></span>
                </div>
            </div>
        </section>

        <!-- ═══ SCREEN 1: GUT CHECK ═══ -->
        <section class="screen" id="screen-1">
            <p class="eyebrow" data-content="q1Eyebrow"></p>
            <h2 class="question-label" data-content="q1Heading"></h2>
            <div class="mood-grid" id="mood-grid-container" role="radiogroup" aria-label="How do you feel about retirement"></div>
            <p class="helper-text" data-content="q1Helper"></p>
        </section>

        <!-- ═══ SCREEN 2: AGE ═══ -->
        <section class="screen" id="screen-2" aria-labelledby="q2-label">
            <button class="back-arrow" type="button" data-goto="1" aria-label="Go back">&larr;</button>
            <div class="step-counter" aria-hidden="true" data-content="q2Progress"></div>
            <label class="sr-only" id="q2-label">Your age and target retirement age</label>
            <div class="sentence-block">
                <div class="sentence-line">
                    <span data-content="q2Part1"></span>
                    <input type="text" id="input-age" class="sentence-input" placeholder="42" inputmode="numeric" pattern="[0-9]*" aria-label="Current age">
                    <span data-content="q2Part2"></span>
                    <span data-content="q2Part3"></span>
                    <input type="text" id="input-retire-age" class="sentence-input" placeholder="65" inputmode="numeric" pattern="[0-9]*" aria-label="Target retirement age">
                    <span data-content="q2Part4"></span>
                </div>
            </div>
            <p class="helper-text" data-content="q2Helper"></p>
            <div class="error-msg" id="age-error" role="alert"></div>
            <div class="nav-buttons">
                <button class="btn btn-primary" type="button" id="age-next" disabled data-content="btnNext"></button>
            </div>
        </section>

        <!-- ═══ SCREEN 3: INTERSTITIAL ═══ -->
        <section class="screen" id="screen-3">
            <div class="interstitial">
                <h2 data-content="interstitialTitle"></h2>
                <p data-content="interstitialBody"></p>
                <hr class="card-divider">
                <button class="btn btn-primary" type="button" data-goto="4" data-content="btnContinue"></button>
            </div>
        </section>

        <!-- ═══ SCREEN 4: INCOME ═══ -->
        <section class="screen" id="screen-4">
            <button class="back-arrow" type="button" data-goto="2" aria-label="Go back">&larr;</button>
            <div class="step-counter" aria-hidden="true" data-content="q3Progress"></div>
            <h2 class="question-label" data-content="q3Heading"></h2>
            <div class="currency-wrap">
                <span class="currency-symbol">$</span>
                <input type="text" id="input-income" class="currency-input" placeholder="120,000" inputmode="numeric" aria-label="Annual household income">
            </div>
            <p class="helper-text" data-content="q3Helper"></p>
            <div class="error-msg" id="income-error" role="alert"></div>
            <div class="nav-buttons">
                <button class="btn btn-primary" type="button" id="income-next" disabled data-content="btnNext"></button>
            </div>
        </section>

        <!-- ═══ SCREEN 5: SAVINGS ═══ -->
        <section class="screen" id="screen-5">
            <button class="back-arrow" type="button" data-goto="4" aria-label="Go back">&larr;</button>
            <div class="step-counter" aria-hidden="true" data-content="q4Progress"></div>
            <h2 class="question-label" data-content="q4Heading"></h2>
            <div class="currency-wrap">
                <span class="currency-symbol">$</span>
                <input type="text" id="input-savings" class="currency-input" placeholder="85,000" inputmode="numeric" aria-label="Current retirement savings">
            </div>
            <p class="helper-text" data-content="q4Helper"></p>
            <div class="error-msg" id="savings-error" role="alert"></div>
            <div class="nav-buttons">
                <button class="btn btn-primary" type="button" id="savings-next" disabled data-content="btnNext"></button>
            </div>
        </section>

        <!-- ═══ SCREEN 6: MONTHLY SAVINGS ═══ -->
        <section class="screen" id="screen-6">
            <button class="back-arrow" type="button" data-goto="5" aria-label="Go back">&larr;</button>
            <div class="step-counter" aria-hidden="true" data-content="q5Progress"></div>
            <h2 class="question-label" data-content="q5Heading"></h2>
            <div class="currency-wrap">
                <span class="currency-symbol">$</span>
                <input type="text" id="input-monthly" class="currency-input" placeholder="800" inputmode="numeric" aria-label="Monthly retirement savings">
            </div>
            <p class="helper-text" data-content="q5Helper"></p>
            <div class="error-msg" id="monthly-error" role="alert"></div>
            <div class="nav-buttons">
                <button class="btn btn-primary" type="button" id="monthly-next" disabled data-content="btnShowResults"></button>
            </div>
        </section>

        <!-- ═══ SCREEN 7: LOADING ═══ -->
        <section class="screen" id="screen-7">
            <div class="loading-screen" role="status" aria-live="polite">
                <div class="loading-dots" aria-hidden="true">
                    <span></span><span></span><span></span>
                </div>
                <p class="loading-label" data-content="loadingText"></p>
            </div>
        </section>

        <!-- ═══ SCREEN 8: RESULTS ═══ -->
        <section class="screen" id="screen-8">

            <button class="edit-numbers" type="button" id="edit-numbers">&larr; Edit your numbers</button>

            <!-- Print-only header -->
            <div class="print-header">
                <h1 data-content="printHeaderTitle"></h1>
                <p data-content="printHeaderSub"></p>
            </div>

            <!-- Hero: Ring + Verdict side by side -->
            <div class="results-hero">
                <div class="ring-section">
                    <div class="vault-wrap">
                        <svg viewBox="0 0 220 300" role="img" aria-label="Vault chamber showing retirement funding progress">
                            <defs>
                                <linearGradient id="vaultGrad" x1="0" y1="1" x2="0.3" y2="0">
                                    <stop offset="0%" stop-color="#92400E"/>
                                    <stop offset="50%" stop-color="#D97706"/>
                                    <stop offset="100%" stop-color="#F4BF3A"/>
                                </linearGradient>
                                <clipPath id="vaultClip">
                                    <path d="M40,268 L40,100 Q40,38 110,38 Q180,38 180,100 L180,268 Z"/>
                                </clipPath>
                            </defs>

                            <!-- Vault frame -->
                            <rect class="vault-frame" x="18" y="18" width="184" height="264" rx="10"/>

                            <!-- Arched chamber interior -->
                            <path class="vault-interior" d="M40,268 L40,100 Q40,38 110,38 Q180,38 180,100 L180,268 Z"/>

                            <!-- Gold fill (clipped to arch) -->
                            <g clip-path="url(#vaultClip)">
                                <rect id="vault-fill" class="vault-fill-rect" x="40" y="268" width="140" height="0"/>
                                <ellipse id="vault-surface" cx="110" cy="268" rx="70" ry="7" fill="#ffd96c" opacity="0.7"/>
                            </g>

                            <!-- Corner bolts -->
                            <circle class="vault-bolt" cx="30" cy="30" r="5"/>
                            <circle class="vault-bolt" cx="190" cy="30" r="5"/>
                            <circle class="vault-bolt" cx="30" cy="270" r="5"/>
                            <circle class="vault-bolt" cx="190" cy="270" r="5"/>

                            <!-- Keystone accent -->
                            <path d="M100,22 L110,14 L120,22" fill="none" stroke="var(--border-strong)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

                            <!-- Percentage chip + label -->
                            <rect x="73" y="128" width="74" height="34" rx="17" class="vault-chip"/>
                            <text id="vault-pct" x="110" y="150" text-anchor="middle" class="vault-chip-text">0%</text>
                            <text x="110" y="180" text-anchor="middle" class="vault-label" data-content="ringLabel">funded</text>
                        </svg>
                    </div>
                </div>

                <div class="verdict-section reveal" id="reveal-verdict">
                    <h2 class="verdict-title" id="verdict-title"></h2>
                    <p class="verdict-body" id="verdict-body"></p>
                </div>
            </div>

            <!-- Two-column: Starting Point + Strategy -->
            <div class="results-columns">
                <!-- Math Breakdown -->
                <div class="explainer-section reveal" id="reveal-explainer">
                    <h2 class="explainer-title" data-content="explainerTitle"></h2>
                    <table class="calc-table">
                        <tr>
                            <td data-content="calcLabelIncome"></td>
                            <td id="calc-income"></td>
                        </tr>
                        <tr>
                            <td data-content="calcLabelCurrentSavings"></td>
                            <td id="calc-current-savings"></td>
                        </tr>
                        <tr>
                            <td data-content="calcLabelSavings"></td>
                            <td id="calc-annual-savings"></td>
                        </tr>
                        <tr>
                            <td data-content="calcLabelExpenses"></td>
                            <td id="calc-expenses"></td>
                        </tr>
                        <tr>
                            <td data-content="calcLabelTarget"></td>
                            <td id="calc-target"></td>
                        </tr>
                        <tr>
                            <td data-content="calcLabelProjected"></td>
                            <td id="calc-projected"></td>
                        </tr>
                    </table>

                    <!-- Summary Card (Your adjusted picture) -->
                    <div class="summary-card reveal" id="summary-card">
                        <div class="summary-card-title" data-content="summaryCardTitle"></div>
                        <div class="summary-row">
                            <span class="summary-row-label" data-content="summaryLabelCurrent"></span>
                            <span id="summary-current"></span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-row-label" data-content="summaryLabelOriginalAge"></span>
                            <span id="summary-orig-age"></span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-row-label" data-content="summaryLabelAdjSav"></span>
                            <span id="summary-adj-sav"></span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-row-label" data-content="summaryLabelAdjAge"></span>
                            <span id="summary-adj-age"></span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-row-label" data-content="summaryLabelAdjPt"></span>
                            <span id="summary-adj-pt"></span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-row-label" data-content="summaryLabelResult"></span>
                            <span id="summary-result" class="summary-result-pct" aria-live="polite"></span>
                        </div>
                    </div>
                </div>

                <!-- Strategy Section -->
                <div class="strategy-section reveal" id="strategy-section">
                    <h2 class="strategy-section-title" data-content="strategySectionTitle"></h2>

                    <!-- Save More -->
                    <div class="strategy-card">
                        <div class="strategy-card-title" data-content="strategyCardSaveTitle"></div>
                        <div class="slider-label">
                            <span data-content="sliderSaveLabel"></span>

    // ═══════════════════════════════════════════
    // PART 2: TEMPLATE ENGINE
    // ═══════════════════════════════════════════
    function renderContent() {
        // Simple key binding
        document.querySelectorAll('[data-content]').forEach(el => {
            const key = el.getAttribute('data-content');
            if (projectContent[key] !== undefined) {
                el.innerHTML = projectContent[key];
            }
        });

        // Array: mood cards
        const moodContainer = document.getElementById('mood-grid-container');
        if (moodContainer && projectContent.moodOptions) {
            moodContainer.innerHTML = '';
            projectContent.moodOptions.forEach(opt => {
                moodContainer.innerHTML += `
                    <button class="mood-card" type="button" role="radio" aria-checked="false" data-mood="${opt.id}">
                        <span class="mood-emoji">${opt.emoji}</span>
                        <span class="mood-label">${opt.label}</span>
                    </button>`;
            });
        }
    }

    // ═══════════════════════════════════════════
    // PART 3: APP LOGIC
    // ═══════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
        renderContent();

        // ── State ──
        const state = {
            mood: null,
            age: null,
            retireAge: null,
            income: null,
            savings: null,
            monthly: null
        };

        // ── Restore saved session ──
        let resumeScreen = null;
        try {
            const saved = JSON.parse(sessionStorage.getItem('marcus_quiz_state'));
            if (saved && saved.state && saved.screen) {
                Object.assign(state, saved.state);
                resumeScreen = saved.screen;
            }
        } catch (e) {}

        // ── Helpers ──
        const $ = id => document.getElementById(id);
        const screens = document.querySelectorAll('.screen');

        // ── Session persistence ──
        const STORAGE_KEY = 'marcus_quiz_state';
        function saveSession(screen) {
            try {
                sessionStorage.setItem(STORAGE_KEY, JSON.stringify({ state, screen }));
            } catch (e) { /* quota or private mode — silently skip */ }
        }
        function clearSession() {
            try { sessionStorage.removeItem(STORAGE_KEY); } catch (e) {}
        }

        // Progress bar: screens 1-6 map to 0%-100%
        const progressSteps = { 1: 16, 2: 33, 3: 50, 4: 66, 5: 83, 6: 100 };

        function goTo(n) {
            screens.forEach(s => s.classList.remove('active'));
            const target = $('screen-' + n);
            target.classList.add('active');
            target.style.animation = 'none';
            target.offsetHeight; // trigger reflow
            target.style.animation = '';
            window.scrollTo({ top: 0, behavior: 'instant' });

            // Update progress bar
            const pct = progressSteps[n] || 0;
            const bar = $('progress-bar');
            bar.style.width = pct + '%';
            bar.setAttribute('aria-valuenow', pct);

            // Save progress (skip loading/results screens)
            if (n >= 1 && n <= 6) saveSession(n);

            // Auto-focus the first interactive element so Enter works immediately
            // Skip results screen (screen 8) — it has staggered reveals
            if (n !== 8) {
                const focusable = target.querySelector('button:not(.back-arrow):not(:disabled), input:not(:disabled)');
                if (focusable) setTimeout(() => focusable.focus(), 50);
            }
        }

        function fmtCurrency(n) {
            if (n >= 1e6) {
                const m = n / 1e6;
                return '$' + (m % 1 === 0 ? m.toFixed(0) : m.toFixed(1)) + 'M';
            }
            return '$' + Math.round(n).toLocaleString('en-US');
        }

        function parseCurrency(str) {
            return parseInt(str.replace(/[^0-9]/g, ''), 10) || 0;
        }

        function formatInputCurrency(val) {
            const num = parseInt(val.replace(/[^0-9]/g, ''), 10);
            if (isNaN(num)) return '';
            return num.toLocaleString('en-US');
        }

        // ── Currency input formatting ──
        function setupCurrencyInput(inputEl, nextBtn, errorEl, allowZero) {
            inputEl.addEventListener('input', () => {
                const raw = inputEl.value;
                const formatted = formatInputCurrency(raw);
                const cursorPos = inputEl.selectionStart;
                const prevLen = raw.length;
                inputEl.value = formatted;
                // Adjust cursor for added/removed commas
                const diff = formatted.length - prevLen;
                inputEl.setSelectionRange(cursorPos + diff, cursorPos + diff);

                const num = parseCurrency(formatted);
                if (allowZero) {
                    nextBtn.disabled = formatted === '';
                } else {
                    nextBtn.disabled = num <= 0;
                }
                if (errorEl) errorEl.textContent = '';
            });
        }

        // ── Enter key advances from any input to its Next button ──
        function enterToAdvance(inputEl, btnEl) {
            inputEl.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !btnEl.disabled) {
                    e.preventDefault();
                    btnEl.click();
                }
            });
        }

        // ── Screen 0: Start ──
        $('start-btn').addEventListener('click', () => goTo(1));

        // ── Screen 1: Mood ──
        const moodCards = () => document.querySelectorAll('.mood-card');
        moodCards().forEach(card => {
            card.addEventListener('click', () => {
                moodCards().forEach(c => c.setAttribute('aria-checked', 'false'));
                card.setAttribute('aria-checked', 'true');
                state.mood = card.dataset.mood;
                setTimeout(() => goTo(2), 250);
            });
        });

        // Arrow-key navigation for radiogroup
        document.getElementById('mood-grid-container').addEventListener('keydown', (e) => {
            if (!['ArrowLeft', 'ArrowRight'].includes(e.key)) return;
            const cards = [...moodCards()];
            const current = cards.findIndex(c => c === document.activeElement);
            if (current === -1) return;
            e.preventDefault();
            const next = e.key === 'ArrowRight'
                ? (current + 1) % cards.length
                : (current - 1 + cards.length) % cards.length;
            cards[next].focus();
        });

        // ── Screen 2: Age ──
        const ageInput = $('input-age');
        const retireInput = $('input-retire-age');
        const ageNext = $('age-next');
        const ageError = $('age-error');

        function validateAge() {
            const age = parseInt(ageInput.value, 10);
            const retire = parseInt(retireInput.value, 10);
            ageError.textContent = '';

            if (!age || !retire) {
                ageNext.disabled = true;
                return;
            }
            if (age < 18 || age > 80) {
                ageError.textContent = 'Enter an age between 18 and 80.';
                ageNext.disabled = true;
                return;
            }
            if (retire <= age) {
                ageError.textContent = 'Retirement age needs to be after your current age.';
                ageNext.disabled = true;
                return;
            }
            if (retire > 85) {
                ageError.textContent = 'Enter a retirement age of 85 or earlier.';
                ageNext.disabled = true;
                return;
            }
            ageNext.disabled = false;
        }

        ageInput.addEventListener('input', () => {
            ageInput.value = ageInput.value.replace(/[^0-9]/g, '').slice(0, 2);
            validateAge();
        });
        retireInput.addEventListener('input', () => {
            retireInput.value = retireInput.value.replace(/[^0-9]/g, '').slice(0, 2);
            validateAge();
        });

        enterToAdvance(ageInput, ageNext);
        enterToAdvance(retireInput, ageNext);

        ageNext.addEventListener('click', () => {
            state.age = parseInt(ageInput.value, 10);
            state.retireAge = parseInt(retireInput.value, 10);
            goTo(3);
        });

        // ── Screen 3: Interstitial ──
        // handled by data-goto

        // ── Screen 4: Income ──
        setupCurrencyInput($('input-income'), $('income-next'), $('income-error'));
        enterToAdvance($('input-income'), $('income-next'));
        $('income-next').addEventListener('click', () => {
            state.income = parseCurrency($('input-income').value);
            goTo(5);
        });

        // ── Screen 5: Savings ──
        setupCurrencyInput($('input-savings'), $('savings-next'), $('savings-error'), true);
        enterToAdvance($('input-savings'), $('savings-next'));
        $('savings-next').addEventListener('click', () => {
            state.savings = parseCurrency($('input-savings').value);
            goTo(6);
        });

        // ── Screen 6: Monthly ──
        setupCurrencyInput($('input-monthly'), $('monthly-next'), $('monthly-error'));
        enterToAdvance($('input-monthly'), $('monthly-next'));
        $('monthly-next').addEventListener('click', () => {
            state.monthly = parseCurrency($('input-monthly').value);
            goTo(7);
            setTimeout(() => {
                calculateAndShowResults();
            }, 1800);
        });

        // ── Back arrows & data-goto buttons ──
        document.querySelectorAll('[data-goto]').forEach(btn => {
            if (btn.id && ['age-next', 'income-next', 'savings-next', 'monthly-next'].includes(btn.id)) return;
            btn.addEventListener('click', () => {
                goTo(parseInt(btn.dataset.goto, 10));
            });
        });

        // ── Math ──
        function calcProjected(currentSavings, monthlySavings, yearsLeft) {
            if (yearsLeft <= 0) return currentSavings;
            const monthlyRate = 0.07 / 12;
            const months = yearsLeft * 12;
            const fvSavings = currentSavings * Math.pow(1 + monthlyRate, months);
            const fvContributions = monthlySavings * ((Math.pow(1 + monthlyRate, months) - 1) / monthlyRate);
            return fvSavings + fvContributions;
        }

        // ── Results ──
        let baseResults = {};

        function calculateAndShowResults() {
            const annualSavings = state.monthly * 12;
            const expenses = state.income - annualSavings;
            const target = expenses * 25;
            const yearsLeft = state.retireAge - state.age;
            const projected = calcProjected(state.savings, state.monthly, yearsLeft);
            const pct = target > 0 ? Math.round((projected / target) * 100) : 0;

            baseResults = { annualSavings, expenses, target, projected, pct, yearsLeft };

            // Reset for re-entry (if user edited numbers)
            document.querySelectorAll('#screen-8 .reveal').forEach(el => el.classList.remove('visible'));
            $('vault-fill').setAttribute('y', '268');
            $('vault-fill').setAttribute('height', '0');
            $('vault-surface').setAttribute('cy', '268');

            // Populate math breakdown
            $('calc-income').textContent = fmtCurrency(state.income);
            $('calc-current-savings').textContent = fmtCurrency(state.savings);
            $('calc-annual-savings').textContent = fmtCurrency(annualSavings);
            $('calc-expenses').textContent = fmtCurrency(expenses);
            $('calc-target').textContent = fmtCurrency(target);
            $('calc-projected').textContent = fmtCurrency(projected);

            // Fine print
            $('fp-projected').textContent = fmtCurrency(projected);
            $('fp-target').textContent = fmtCurrency(target);
            const gap = projected - target;
            $('fp-gap').textContent = (gap >= 0 ? '+' : '') + fmtCurrency(Math.abs(gap));
            if (gap < 0) $('fp-gap').textContent = '-' + fmtCurrency(Math.abs(gap));

            // Ring
            renderRing(pct);

            // Verdict
            renderVerdict(pct, projected, target);

            // Initialize sliders
            initSliders();

            // Summary card
            updateSummary();

            clearSession(); // results computed — no need to restore mid-flow
            goTo(8);

            // Staggered reveal sequence
            const reveals = [
                { el: 'reveal-verdict', delay: 200 },
                { el: 'reveal-explainer', delay: 600 },
                { el: 'strategy-section', delay: 700 },
                { el: 'summary-card', delay: 1100 },
                { el: 'reveal-actions', delay: 1400 },
                { el: 'reveal-footer', delay: 1700 }
            ];
            reveals.forEach(({ el, delay }) => {
                setTimeout(() => {
                    const node = $(el);
                    if (node) node.classList.add('visible');
                }, delay);
            });
        }

        function renderRing(pct) {
            const clamped = Math.min(pct, 100);
            // Vault interior spans y=268 (bottom) to y=38 (arch peak), fill height ~230
            const maxH = 230;
            const fillH = maxH * (clamped / 100);
            const targetY = 268 - fillH;

            // Reset
            $('vault-fill').setAttribute('y', '268');
            $('vault-fill').setAttribute('height', '0');
            $('vault-surface').setAttribute('cy', '268');
            $('vault-pct').textContent = '0%';

            // Update dynamic aria-label
            const vaultSvg = $('vault-fill').closest('svg');
            if (vaultSvg) vaultSvg.setAttribute('aria-label', 'Vault showing ' + pct + '% funded');

            setTimeout(() => {
                animateVault(targetY, fillH, 1400);
                animateCounter($('vault-pct'), 0, pct, 1200);
            }, 100);
        }

        function animateVault(targetY, targetH, duration) {
            const startY = 268;
            const rect = $('vault-fill');
            const surface = $('vault-surface');
            const start = performance.now();

            function tick(now) {
                const p = Math.min((now - start) / duration, 1);
                const eased = 1 - Math.pow(1 - p, 3);
                const h = targetH * eased;
                const y = startY - h;
                rect.setAttribute('y', y);
                rect.setAttribute('height', h);
                surface.setAttribute('cy', y);
                if (p < 1) requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        }

        function animateCounter(el, from, to, duration) {
            const start = performance.now();
            function tick(now) {
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                // Ease-out cubic for deceleration matching the ring
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(from + (to - from) * eased);
                el.textContent = current + '%';
                if (progress < 1) requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        }

        function renderVerdict(pct, projected, target) {
            let titleKey, bodyKey;
            const moodCap = state.mood === 'ontrack' ? 'OnTrack' : state.mood === 'unsure' ? 'Unsure' : 'Behind';

            if (pct >= 100) {
                titleKey = 'verdictAheadTitle';
                bodyKey = 'verdictAheadBody' + moodCap;
            } else if (pct >= 80) {
                titleKey = 'verdictOnTrackTitle';
                bodyKey = 'verdictOnTrackBody' + moodCap;
            } else {
                titleKey = 'verdictShortfallTitle';
                bodyKey = 'verdictShortfallBody' + moodCap;
            }

            $('verdict-title').textContent = projectContent[titleKey];
            let bodyText = projectContent[bodyKey]
                .replace(/\{\{projected\}\}/g, fmtCurrency(projected))
                .replace(/\{\{target\}\}/g, fmtCurrency(target));
            $('verdict-body').textContent = bodyText;
        }

        // ── Sliders ──
        let slidersInitialized = false;
        function initSliders() {
            const sliderSave = $('slider-save');
            const sliderTime = $('slider-time');
            const sliderPt = $('slider-pt');

            // Set ranges and initial values
            const saveMax = Math.max(Math.min(Math.max(state.monthly * 5, 10000), Math.floor(state.income / 12)), state.monthly + 500);
            sliderSave.min = state.monthly;
            sliderSave.max = saveMax;
            sliderSave.step = Math.max(50, Math.round((saveMax - state.monthly) / 50) > 0 ? 50 : 10);
            sliderSave.value = state.monthly;

            sliderTime.min = state.retireAge;
            sliderTime.max = Math.min(state.retireAge + 10, 80);
            sliderTime.value = state.retireAge;

            sliderPt.min = 0;
            sliderPt.max = 60000;
            sliderPt.value = 0;

            $('slider-save-value').textContent = fmtCurrency(state.monthly) + '/mo';
            $('slider-time-value').textContent = state.retireAge;
            $('slider-pt-value').textContent = '$0/yr';

            // Attach listeners only once
            if (!slidersInitialized) {
                sliderSave.addEventListener('input', recalcSliders);
                sliderTime.addEventListener('input', recalcSliders);
                sliderPt.addEventListener('input', recalcSliders);
                slidersInitialized = true;
            }
        }

        function recalcSliders() {
            const adjMonthly = parseInt($('slider-save').value, 10);
            const adjRetireAge = parseInt($('slider-time').value, 10);
            const adjPt = parseInt($('slider-pt').value, 10);

            $('slider-save-value').textContent = fmtCurrency(adjMonthly) + '/mo';
            $('slider-time-value').textContent = adjRetireAge;
            $('slider-pt-value').textContent = fmtCurrency(adjPt) + '/yr';

            const adjYears = adjRetireAge - state.age;
            const adjProjected = calcProjected(state.savings, adjMonthly, adjYears);
            const adjExpenses = Math.max(state.income - (adjMonthly * 12), 0);
            const adjTarget = Math.max((adjExpenses - adjPt) * 25, 0);
            const adjPct = adjTarget > 0 ? Math.round((adjProjected / adjTarget) * 100) : (adjProjected > 0 ? 100 : 0);

            updateSummary(adjMonthly, adjRetireAge, adjPt, adjPct);
        }

        function updateSummary(adjMonthly, adjRetireAge, adjPt, adjPct) {
            adjMonthly = adjMonthly || state.monthly;
            adjRetireAge = adjRetireAge || state.retireAge;
            adjPt = adjPt || 0;
            adjPct = adjPct || baseResults.pct;

            $('summary-current').textContent = fmtCurrency(state.monthly) + '/mo';
            $('summary-orig-age').textContent = state.retireAge;
            $('summary-adj-sav').textContent = fmtCurrency(adjMonthly) + '/mo';
            $('summary-adj-age').textContent = adjRetireAge;
            $('summary-adj-pt').textContent = fmtCurrency(adjPt) + '/yr';
            $('summary-result').textContent = adjPct + '% funded';

            // Color the result
            let color = adjPct >= 100 ? 'var(--low)' : adjPct >= 80 ? 'var(--medium)' : 'var(--critical)';
            $('summary-result').style.color = color;
        }

        // ── Fine Print Toggle ──
        $('fine-print-toggle').addEventListener('click', () => {
            const body = $('fine-print-body');
            const toggle = $('fine-print-toggle');
            const isOpen = body.classList.contains('open');
            body.classList.toggle('open');
            toggle.setAttribute('aria-expanded', !isOpen);
        });

        // ── Actions ──
        // ── Edit Numbers (back to screen 4) ──
        $('edit-numbers').addEventListener('click', () => goTo(2));

        $('action-save').addEventListener('click', () => window.print());

        $('action-send').addEventListener('click', () => {
            $('send-overlay').classList.add('open');
            $('send-name').focus();
        });

        $('send-cancel').addEventListener('click', () => {
            $('send-overlay').classList.remove('open');
        });

        $('send-overlay').addEventListener('click', (e) => {
            if (e.target === $('send-overlay')) {
                $('send-overlay').classList.remove('open');
            }
        });

        // Focus trap for send modal
        $('send-overlay').addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                $('send-overlay').classList.remove('open');
                return;
            }
            if (e.key !== 'Tab') return;
            const focusable = $('send-overlay').querySelectorAll('input, textarea, button, [tabindex]:not([tabindex="-1"])');
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            if (e.shiftKey && document.activeElement === first) {
                e.preventDefault();
                last.focus();
            } else if (!e.shiftKey && document.activeElement === last) {
                e.preventDefault();
                first.focus();
            }
        });

        $('send-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = $('send-name').value;
            const email = $('send-email').value;
            const note = $('send-note').value;

            const subject = encodeURIComponent('Retirement readiness results from ' + name);
            const body = encodeURIComponent(
                'Name: ' + name + '\n' +
                'Email: ' + email + '\n' +
                'Age: ' + state.age + '\n' +
                'Retirement age: ' + state.retireAge + '\n' +
                'Income: ' + fmtCurrency(state.income) + '\n' +
                'Current savings: ' + fmtCurrency(state.savings) + '\n' +
                'Monthly savings: ' + fmtCurrency(state.monthly) + '\n' +
                'Projected: ' + fmtCurrency(baseResults.projected) + '\n' +
                'Target: ' + fmtCurrency(baseResults.target) + '\n' +
                'Funded: ' + baseResults.pct + '%' +
                (note ? '\n\nNote: ' + note : '')
            );

            window.location.href = 'mailto:marcus@example.com?subject=' + subject + '&body=' + body;

            $('send-form-content').style.display = 'none';
            $('send-success').classList.add('show');

            setTimeout(() => {
                $('send-overlay').classList.remove('open');
                $('send-form-content').style.display = '';
                $('send-success').classList.remove('show');
                $('send-form').reset();
            }, 3000);
        });

        // ── Resume saved session ──
        if (resumeScreen) {
            // Populate inputs from saved state
            if (state.mood) {
                const card = document.querySelector(`[data-mood="${state.mood}"]`);
                if (card) card.setAttribute('aria-checked', 'true');
            }
            if (state.age) $('input-age').value = state.age;
            if (state.retireAge) $('input-retire-age').value = state.retireAge;
            if (state.income) $('input-income').value = state.income.toLocaleString('en-US');
            if (state.savings) $('input-savings').value = state.savings.toLocaleString('en-US');
            if (state.monthly != null) $('input-monthly').value = state.monthly.toLocaleString('en-US');

            // Enable next buttons for populated screens
            if (state.age && state.retireAge) $('age-next').disabled = false;
            if (state.income) $('income-next').disabled = false;
            if (state.savings) $('savings-next').disabled = false;
            if (state.monthly != null) $('monthly-next').disabled = false;

            goTo(resumeScreen);
        }
    });
    </script>
</body>
